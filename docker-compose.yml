services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-userdata}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-userdata}"]
      interval: 5s
      timeout: 5s
      retries: 10

  userdata:
    build: .
    env_file: .env
    environment:
      # Override host to reach the postgres service inside the compose network.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-userdata}
    ports:
      - "${APP_PORT:-8100}:8100"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
